<div class="flex min-h-screen items-center justify-center bg-background p-4">
  <div class="w-full max-w-sm">
    <!-- Logo / Titre -->
    <div class="mb-8 text-center">
      <div
        class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-primary text-primary-foreground"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 2a10 10 0 1 0 10 10" />
          <path d="M12 6v6l4 2" />
          <path d="M22 2 12 12" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold tracking-tight text-foreground">CarbonTrack</h1>
      <p class="mt-1 text-sm text-muted-foreground">
        Calculateur d'empreinte carbone — Capgemini
      </p>
    </div>

    <!-- Card -->
    <div class="rounded-xl border border-border bg-card p-6 shadow-sm">
      <div class="mb-6">
        <h2 class="text-lg font-semibold text-card-foreground">Connexion</h2>
        <p class="mt-1 text-sm text-muted-foreground">
          Entrez vos identifiants pour accéder à votre espace
        </p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <!-- Email -->
        <div class="space-y-2">
          <label hlmLabel for="email">Adresse e-mail</label>
          <input
            hlmInput
            id="email"
            type="email"
            formControlName="email"
            placeholder="vous@exemple.com"
            autocomplete="email"
            class="w-full"
            [class.border-destructive]="isEmailInvalid()"
            [attr.aria-invalid]="isEmailInvalid() || null"
            aria-describedby="email-error"
          />
          @if (isEmailInvalid()) {
            <p id="email-error" class="text-xs text-destructive" role="alert">
              Veuillez saisir une adresse e-mail valide.
            </p>
          }
        </div>

        <!-- Mot de passe -->
        <div class="space-y-2">
          <label hlmLabel for="password">Mot de passe</label>
          <input
            hlmInput
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
            class="w-full"
            [class.border-destructive]="isPasswordInvalid()"
            [attr.aria-invalid]="isPasswordInvalid() || null"
            aria-describedby="password-error"
          />
          @if (isPasswordInvalid()) {
            <p id="password-error" class="text-xs text-destructive" role="alert">
              Le mot de passe est requis.
            </p>
          }
        </div>

        <!-- Erreur globale -->
        @if (errorMessage()) {
          <div
            class="rounded-md border border-destructive/30 bg-destructive/10 px-3 py-2 text-sm text-destructive"
            role="alert"
            aria-live="assertive"
          >
            {{ errorMessage() }}
          </div>
        }

        <!-- Bouton -->
        <button
          hlmBtn
          type="submit"
          class="w-full"
          [disabled]="loading()"
          aria-label="Se connecter"
        >
          @if (loading()) {
            <svg
              class="animate-spin"
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 12a9 9 0 1 1-6.219-8.56" />
            </svg>
            Connexion en cours…
          } @else {
            Se connecter
          }
        </button>
      </form>
    </div>
  </div>
</div>
