<div class="flex h-screen flex-col overflow-hidden bg-background">
  <!-- Navbar -->
  <header class="z-20 flex h-14 shrink-0 items-center justify-between border-b border-border bg-background/95 px-4 backdrop-blur">
    <div class="flex items-center gap-3">
      <!-- Sidebar toggle (mobile) -->
      <button
        class="flex h-8 w-8 items-center justify-center rounded-md hover:bg-accent lg:hidden"
        (click)="sidebarOpen.set(!sidebarOpen())"
        aria-label="Basculer le menu"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary text-primary-foreground">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/><path d="M22 2 12 12"/>
        </svg>
      </div>
      <span class="text-sm font-semibold tracking-tight">CarbonTrack</span>
      <span class="hidden text-xs text-muted-foreground sm:block">— Capgemini</span>
    </div>

    <div class="flex items-center gap-3">
      @if (user()) {
        <span class="hidden text-sm text-muted-foreground sm:block">
          {{ user()?.email }}
        </span>
      }
      <button
        class="inline-flex h-8 items-center justify-center rounded-md border border-input bg-background px-3 text-xs font-medium shadow-sm transition-colors hover:bg-accent hover:text-accent-foreground"
        (click)="logout()"
      >
        Déconnexion
      </button>
    </div>
  </header>

  <!-- Body -->
  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside
      class="z-10 flex w-64 shrink-0 flex-col border-r border-border bg-background transition-all duration-200"
      [class.hidden]="!sidebarOpen()"
      [class.lg:flex]="true"
    >
      <nav class="flex-1 overflow-y-auto py-4">
        <ul class="space-y-0.5 px-2">
          @for (item of navItems; track item.path) {
            <li>
              <a
                [routerLink]="item.path"
                routerLinkActive="bg-accent text-accent-foreground font-medium"
                [routerLinkActiveOptions]="{ exact: true }"
                class="flex items-center gap-3 rounded-md px-3 py-2 text-sm text-muted-foreground transition-colors hover:bg-accent hover:text-accent-foreground"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path [attr.d]="item.iconPath"/>
                </svg>
                {{ item.label }}
              </a>
            </li>
          }
        </ul>
      </nav>

      <div class="border-t border-border p-4">
        <p class="text-[11px] text-muted-foreground">Hackathon Sup De Vinci 2026</p>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto">
      <router-outlet />
    </main>
  </div>
</div>
